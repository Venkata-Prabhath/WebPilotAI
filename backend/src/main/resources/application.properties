spring.application.name=webpilot

server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/webpilot
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

jwt.secret=7QmP9vX2Lk8RtN5ZcY4HsW1AaE6BgFpJ3DxUqMnK8VsTzR5HyL9NcW4AeFpJ8Lk2Mx
jwt.expiration=86400000
jwt.refresh-expiration=604800000

gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-3.5-flash
gemini.url=https://generativelanguage.googleapis.com/v1beta

logging.level.root=INFO
logging.level.com.webpilot=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jackson.serialization.indent-output=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always